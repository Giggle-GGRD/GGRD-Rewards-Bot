version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: ggrd-mongo
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      # Root credentials (password from .env, username hardcoded)
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      # App user (passed to docker/mongo-init.js)
      MONGO_APP_USER: ggrd_bot_admin
      MONGO_APP_PASS: ${MONGODB_PASS}
      MONGO_APP_DB: ggrd_bot
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/01-mongo-init.js:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet \"mongodb://root:$${MONGO_INITDB_ROOT_PASSWORD}@localhost:27017/admin\" --eval \"db.runCommand({ ping: 1 }).ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mongo_data:
